<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Resume Tailor{% endblock %}</title>
    <style>
      :root {
        --bg: #0a0f1c;
        --bg-soft: rgba(17, 24, 39, 0.82);
        --panel: rgba(15, 23, 42, 0.7);
        --panel-2: rgba(30, 41, 59, 0.45);
        --border: rgba(255, 255, 255, 0.1);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --muted-2: #64748b;
        --accent: #22d3ee;
        --accent-2: #10b981;
        --danger: #fca5a5;
        --danger-bg: rgba(127, 29, 29, 0.28);
        --success: #86efac;
        --success-bg: rgba(20, 83, 45, 0.26);
        --shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "DM Sans", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(34, 211, 238, 0.1), transparent 30%),
          radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.08), transparent 28%),
          linear-gradient(135deg, #0a0f1c 0%, #111827 50%, #0f172a 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 60px 60px;
        pointer-events: none;
      }

      a {
        color: var(--accent);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .page-shell {
        position: relative;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 20px;
      }

      .panel {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 760px;
        background: var(--bg-soft);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        padding: 40px;
      }

      .hero {
        margin-bottom: 28px;
        text-align: center;
      }

      .hero h1 {
        margin: 0;
        font-size: 32px;
        line-height: 1.1;
        letter-spacing: -0.04em;
        background: linear-gradient(135deg, #f1f5f9 0%, #94a3b8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .hero p {
        margin: 14px auto 0;
        max-width: 520px;
        color: var(--muted);
        line-height: 1.6;
      }

      .badge {
        width: 52px;
        height: 52px;
        display: grid;
        place-items: center;
        margin: 0 auto 16px;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
        color: #082f49;
        font-size: 24px;
        font-weight: 700;
        box-shadow: 0 8px 32px rgba(34, 211, 238, 0.28);
      }

      .top-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-bottom: 20px;
      }

      .ghost-btn,
      .primary-btn {
        border-radius: 12px;
        border: 1px solid var(--border);
        padding: 12px 16px;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      }

      .ghost-btn {
        background: rgba(15, 23, 42, 0.65);
        color: #cbd5e1;
      }

      .ghost-btn:hover,
      .primary-btn:hover {
        transform: translateY(-1px);
      }

      .primary-btn {
        border: none;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
        color: #082f49;
        font-weight: 700;
        box-shadow: 0 8px 32px rgba(34, 211, 238, 0.25);
      }

      .primary-btn[disabled] {
        cursor: not-allowed;
        opacity: 0.65;
        box-shadow: none;
        transform: none;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .field {
        margin-bottom: 18px;
      }

      .field label {
        display: block;
        margin-bottom: 8px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .field input,
      .field select,
      .field textarea {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text);
        padding: 14px 16px;
        outline: none;
      }

      .field textarea {
        min-height: 220px;
        resize: vertical;
        line-height: 1.7;
        font-family: "JetBrains Mono", "Consolas", monospace;
        font-size: 14px;
        background: var(--panel);
      }

      .field input:focus,
      .field select:focus,
      .field textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.12);
      }

      .notice,
      .result-card,
      .info-card {
        margin-top: 18px;
        border-radius: 14px;
        border: 1px solid var(--border);
        padding: 18px;
      }

      .notice.error {
        background: var(--danger-bg);
        color: var(--danger);
      }

      .notice.success {
        background: var(--success-bg);
        color: var(--success);
      }

      .info-card {
        background: rgba(30, 41, 59, 0.3);
      }

      .result-card {
        background: rgba(15, 23, 42, 0.52);
      }

      .muted {
        color: var(--muted);
      }

      .mono {
        font-family: "JetBrains Mono", "Consolas", monospace;
      }

      .preformatted {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 13px;
        line-height: 1.6;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
        text-align: center;
      }

      .stat {
        padding: 4px 0;
      }

      .stat strong {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      .stat span {
        display: block;
        margin-top: 4px;
        color: var(--muted-2);
        font-size: 11px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .subtle-link {
        color: #cbd5e1;
        text-decoration: none;
      }

      .subtle-link:hover {
        text-decoration: underline;
      }

      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid transparent;
        border-top-color: #64748b;
        border-radius: 50%;
        display: inline-block;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 720px) {
        .panel {
          padding: 24px;
        }

        .form-grid,
        .stats {
          grid-template-columns: 1fr;
        }

        .row,
        .top-actions {
          flex-direction: column;
          align-items: stretch;
        }

        .hero h1 {
          font-size: 28px;
        }
      }
    </style>
    {% block head_extra %}{% endblock %}
  </head>
  <body>
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
  </body>
</html>
