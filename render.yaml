services:
  - type: web
    name: resume-tailor
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: PYTHON_ENV
        value: production

